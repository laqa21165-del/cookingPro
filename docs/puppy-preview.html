<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>小狗标识预览 · 最初 SVG 版本</title>
<style>
  :root{
    --clay:#cb6d5a;
    --brown:#a8674d;
    --cream:#fff8f4;
    --cheek:#ff9d8a;
    --ink:#3b251f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    background:radial-gradient(circle at top left,rgba(251,211,189,.7),transparent 32%),
               radial-gradient(circle at bottom right,rgba(255,227,210,.78),transparent 30%),
               #fff8f4;
    color:var(--ink);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:32px 16px;
  }
  .wrap{width:100%;max-width:440px;}
  .head{text-align:center;margin-bottom:22px;}
  .head .eyebrow{color:#8e6f67;font-size:13px;letter-spacing:.12em;margin-bottom:6px;}
  .head h1{font-size:24px;font-weight:800;}

  .stage{
    background:rgba(255,252,248,.94);
    border-radius:28px;
    padding:30px 20px;
    border:1px solid rgba(255,255,255,.88);
    box-shadow:0 16px 34px rgba(124,86,68,.10);
    text-align:center;
    margin-bottom:18px;
  }
  .dog-big{width:200px;height:200px;margin:0 auto;display:block;
    animation:bob 3.2s ease-in-out infinite;
    filter:drop-shadow(0 10px 16px rgba(124,86,68,.18));
  }
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-8px) rotate(1deg);}}
  .stage .name{margin-top:14px;font-size:18px;font-weight:700;}
  .stage .sub{margin-top:4px;color:#8e6f67;font-size:13px;}

  .puppy-card{
    display:flex;gap:14px;align-items:center;
    padding:14px 16px;border-radius:24px;
    background:rgba(255,248,242,.92);
    border:1px solid rgba(255,255,255,.85);
    box-shadow:0 10px 24px rgba(124,86,68,.08);
    margin-bottom:18px;
  }
  .puppy-card svg{width:96px;height:96px;flex:none;}
  .puppy-card .note{flex:1;color:#8e6f67;font-size:14px;line-height:1.5;}

  .palette{display:flex;gap:10px;justify-content:center;}
  .palette .sw{width:46px;height:46px;border-radius:14px;box-shadow:0 6px 14px rgba(124,86,68,.12);}
  .palette .sw small{display:block;text-align:center;margin-top:52px;font-size:11px;color:#8e6f67;}

  .tip{margin-top:18px;text-align:center;color:#8e6f67;font-size:12px;line-height:1.7;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="eyebrow">MYLOVE · 原木暖阳</div>
      <h1>小狗标识 · 最初 SVG 版本</h1>
    </div>

    <div class="stage">
      <svg class="dog-big" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" aria-label="可爱小狗">
        <defs>
          <radialGradient id="face" cx="50%" cy="40%" r="64%">
            <stop offset="0%" stop-color="#fff7f0"/><stop offset="72%" stop-color="#f8dac5"/><stop offset="100%" stop-color="#eebd9f"/>
          </radialGradient>
          <linearGradient id="ear" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d29376"/><stop offset="100%" stop-color="#a8674d"/>
          </linearGradient>
          <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff9d8a"/><stop offset="100%" stop-color="#ff9d8a" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="60" cy="74" rx="29" ry="45" fill="url(#ear)" transform="rotate(-16 60 74)"/>
        <ellipse cx="180" cy="74" rx="29" ry="45" fill="url(#ear)" transform="rotate(16 180 74)"/>
        <ellipse cx="63" cy="82" rx="14" ry="27" fill="#f3c3ad" transform="rotate(-16 63 82)"/>
        <ellipse cx="177" cy="82" rx="14" ry="27" fill="#f3c3ad" transform="rotate(16 177 82)"/>
        <ellipse cx="120" cy="134" rx="84" ry="78" fill="url(#face)"/>
        <path d="M120 60 q-7 -19 5 -23 q9 5 4 23 z" fill="#e6b18f"/>
        <ellipse cx="73" cy="153" rx="20" ry="12" fill="url(#cheek)"/>
        <ellipse cx="167" cy="153" rx="20" ry="12" fill="url(#cheek)"/>
        <ellipse cx="92" cy="126" rx="14" ry="16.5" fill="#3a2a24"/>
        <ellipse cx="148" cy="126" rx="14" ry="16.5" fill="#3a2a24"/>
        <circle cx="97" cy="120" r="5" fill="#fff"/><circle cx="153" cy="120" r="5" fill="#fff"/>
        <circle cx="88" cy="132" r="2.6" fill="#fff" opacity="0.85"/><circle cx="144" cy="132" r="2.6" fill="#fff" opacity="0.85"/>
        <ellipse cx="120" cy="150" rx="13" ry="9.5" fill="#5a3a31"/>
        <ellipse cx="115" cy="146.5" rx="4" ry="2.6" fill="#8a604f"/>
        <path d="M120 159 L120 167 M120 167 Q106 181 95 171 M120 167 Q134 181 145 171" fill="none" stroke="#5a3a31" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M112 173 Q120 191 128 173 Q128 185 120 187 Q112 185 112 173 Z" fill="#f48a8a"/>
        <path d="M120 176 L120 186" stroke="#d96f6f" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="name">最初的版本 🐶</div>
      <div class="sub">圆脸 · 立式耳朵 · 大眼吐舌微笑</div>
    </div>

    <div class="puppy-card">
      <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" aria-label="可爱小狗">
        <defs>
          <radialGradient id="face2" cx="50%" cy="40%" r="64%">
            <stop offset="0%" stop-color="#fff7f0"/><stop offset="72%" stop-color="#f8dac5"/><stop offset="100%" stop-color="#eebd9f"/>
          </radialGradient>
          <linearGradient id="ear2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d29376"/><stop offset="100%" stop-color="#a8674d"/>
          </linearGradient>
          <radialGradient id="cheek2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff9d8a"/><stop offset="100%" stop-color="#ff9d8a" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="60" cy="74" rx="29" ry="45" fill="url(#ear2)" transform="rotate(-16 60 74)"/>
        <ellipse cx="180" cy="74" rx="29" ry="45" fill="url(#ear2)" transform="rotate(16 180 74)"/>
        <ellipse cx="63" cy="82" rx="14" ry="27" fill="#f3c3ad" transform="rotate(-16 63 82)"/>
        <ellipse cx="177" cy="82" rx="14" ry="27" fill="#f3c3ad" transform="rotate(16 177 82)"/>
        <ellipse cx="120" cy="134" rx="84" ry="78" fill="url(#face2)"/>
        <path d="M120 60 q-7 -19 5 -23 q9 5 4 23 z" fill="#e6b18f"/>
        <ellipse cx="73" cy="153" rx="20" ry="12" fill="url(#cheek2)"/>
        <ellipse cx="167" cy="153" rx="20" ry="12" fill="url(#cheek2)"/>
        <ellipse cx="92" cy="126" rx="14" ry="16.5" fill="#3a2a24"/>
        <ellipse cx="148" cy="126" rx="14" ry="16.5" fill="#3a2a24"/>
        <circle cx="97" cy="120" r="5" fill="#fff"/><circle cx="153" cy="120" r="5" fill="#fff"/>
        <ellipse cx="120" cy="150" rx="13" ry="9.5" fill="#5a3a31"/>
        <path d="M120 159 L120 167 M120 167 Q106 181 95 171 M120 167 Q134 181 145 171" fill="none" stroke="#5a3a31" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M112 173 Q120 191 128 173 Q128 185 120 187 Q112 185 112 173 Z" fill="#f48a8a"/>
      </svg>
      <div class="note">汪，今天也认真接住你的想吃和想说。</div>
    </div>

    <div class="palette">
      <div class="sw" style="background:#cb6d5a"><small>陶土橘</small></div>
      <div class="sw" style="background:#a8674d"><small>暖棕</small></div>
      <div class="sw" style="background:#f8dac5"><small>奶油</small></div>
      <div class="sw" style="background:#ff9d8a"><small>腮红</small></div>
    </div>

    <div class="tip">
      已还原为最初用 SVG 画的版本：圆脸 + 立式耳朵 + 大眼双高光 + 吐舌微笑。<br/>
      小程序端刷新即可看到（home / me 页面共用同一 puppy.svg，无需改其他代码）。
    </div>
  </div>
</body>
</html>
